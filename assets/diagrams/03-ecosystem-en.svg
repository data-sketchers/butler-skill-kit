<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <marker id="arr-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4A574"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0D9488"/>
    </marker>
    <style>
      text { font-family: 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#0B1220"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <text x="640" y="48" fill="#D4A574" font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">BUTLER-SKILL-KIT</text>
  <text x="640" y="80" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">Single-Host Ecosystem</text>
  <text x="640" y="105" fill="#94a3b8" font-size="12" text-anchor="middle">Multiple agent teams · shared kit · cron resilience · external SSH access</text>

  <!-- Outer host boundary -->
  <rect x="40" y="135" width="1200" height="490" rx="14" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="60" y="155" fill="#D4A574" font-size="11" font-weight="700" letter-spacing="2">PHYSICAL HOST · 1 user account</text>
  <text x="1220" y="155" fill="#94a3b8" font-size="9" text-anchor="end" class="mono">e.g. Linux/WSL2 · Mac mini · cloud VM</text>

  <!-- tmux session pool (left) -->
  <rect x="70" y="180" width="540" height="350" rx="10" fill="rgba(13,148,136,0.10)" stroke="#0D9488" stroke-width="1.5"/>
  <text x="90" y="205" fill="#5EEAD4" font-size="11" font-weight="700" letter-spacing="2">TMUX SESSION POOL</text>

  <!-- product team -->
  <rect x="90" y="225" width="240" height="135" rx="8" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="100" y="245" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="1">PRODUCT TEAM (5)</text>
  <rect x="100" y="255" width="100" height="22" rx="3" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1"/>
  <text x="150" y="270" fill="#fbbf24" font-size="9" text-anchor="middle" class="mono">pm-agent</text>
  <rect x="210" y="255" width="100" height="22" rx="3" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1"/>
  <text x="260" y="270" fill="#fbbf24" font-size="9" text-anchor="middle" class="mono">be-agent</text>
  <rect x="100" y="285" width="100" height="22" rx="3" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1"/>
  <text x="150" y="300" fill="#fbbf24" font-size="9" text-anchor="middle" class="mono">fe-agent</text>
  <rect x="210" y="285" width="100" height="22" rx="3" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1"/>
  <text x="260" y="300" fill="#fbbf24" font-size="9" text-anchor="middle" class="mono">qa-agent</text>
  <rect x="100" y="315" width="210" height="22" rx="3" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1"/>
  <text x="205" y="330" fill="#fbbf24" font-size="9" text-anchor="middle" class="mono">fullstack-agent</text>
  <text x="100" y="350" fill="#64748b" font-size="8">PM orchestrates worker sessions via tmux send-keys</text>

  <!-- builder team -->
  <rect x="350" y="225" width="240" height="135" rx="8" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="360" y="245" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="1">BUILDER TEAM (pair)</text>
  <rect x="360" y="255" width="220" height="22" rx="3" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1"/>
  <text x="470" y="270" fill="#fbbf24" font-size="9" text-anchor="middle" class="mono">builder-be-claude  (primary)</text>
  <rect x="360" y="285" width="220" height="22" rx="3" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1"/>
  <text x="470" y="300" fill="#60a5fa" font-size="9" text-anchor="middle" class="mono">builder-be-codex  (standby)</text>
  <text x="470" y="325" fill="#5EEAD4" font-size="8" text-anchor="middle">share workdir + .agent-state.md</text>
  <text x="360" y="350" fill="#64748b" font-size="8">Phase 2/3: add -fe / -infra / -qa pairs</text>

  <!-- biz-plan team -->
  <rect x="90" y="380" width="240" height="130" rx="8" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="100" y="400" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="1">BIZ-PLAN (2)</text>
  <rect x="100" y="410" width="100" height="22" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8B5CF6" stroke-width="1"/>
  <text x="150" y="425" fill="#a78bfa" font-size="9" text-anchor="middle" class="mono">biz-plan</text>
  <rect x="210" y="410" width="100" height="22" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8B5CF6" stroke-width="1"/>
  <text x="260" y="425" fill="#a78bfa" font-size="9" text-anchor="middle" class="mono">biz-plan-spare</text>
  <text x="200" y="455" fill="#64748b" font-size="8" text-anchor="middle">parallel proposal drafting</text>
  <text x="200" y="475" fill="#64748b" font-size="8" text-anchor="middle">primary + spare for resilience</text>

  <!-- Free workers slot -->
  <rect x="350" y="380" width="240" height="130" rx="8" fill="rgba(15,23,42,0.4)" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="400" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="1">SCALE OUT (free slots)</text>
  <text x="470" y="430" fill="#64748b" font-size="9" text-anchor="middle">research-omx</text>
  <text x="470" y="445" fill="#64748b" font-size="9" text-anchor="middle">opencode workers</text>
  <text x="470" y="460" fill="#64748b" font-size="9" text-anchor="middle">N teams of (claude+codex)</text>
  <text x="470" y="490" fill="#64748b" font-size="8" text-anchor="middle" font-style="italic">phase rollout: verify pair → add next</text>

  <!-- Right side: kit + cron -->
  <!-- kit binaries -->
  <rect x="640" y="180" width="280" height="155" rx="10" fill="rgba(212,165,116,0.10)" stroke="#D4A574" stroke-width="1.5"/>
  <text x="660" y="205" fill="#D4A574" font-size="11" font-weight="700" letter-spacing="2">~/.butler-kit/ + ~/bin/</text>
  <text x="660" y="228" fill="#f1f5f9" font-size="11" class="mono">kit-session-ensure.sh</text>
  <text x="660" y="244" fill="#f1f5f9" font-size="11" class="mono">kit-{claude,codex,opencode,omx}-session.sh</text>
  <text x="660" y="260" fill="#f1f5f9" font-size="11" class="mono">kit-handoff.sh</text>
  <text x="660" y="276" fill="#f1f5f9" font-size="11" class="mono">kit-cron-register.sh</text>
  <text x="660" y="292" fill="#f1f5f9" font-size="11" class="mono">kit-install-skill.sh + skills.yaml</text>
  <text x="660" y="318" fill="#94a3b8" font-size="9">all sessions reuse the same kit</text>

  <!-- cron resilience -->
  <rect x="950" y="180" width="270" height="155" rx="10" fill="rgba(13,148,136,0.10)" stroke="#0D9488" stroke-width="1.5"/>
  <text x="970" y="205" fill="#5EEAD4" font-size="11" font-weight="700" letter-spacing="2">CRON RESILIENCE</text>
  <text x="970" y="228" fill="#f1f5f9" font-size="11" class="mono">@reboot sleep 60</text>
  <text x="970" y="244" fill="#94a3b8" font-size="9">→ spawn pool from scratch</text>
  <text x="970" y="266" fill="#f1f5f9" font-size="11" class="mono">*/5 * * * * healthcheck</text>
  <text x="970" y="282" fill="#94a3b8" font-size="9">→ resurrect dead session w/in 5 min</text>
  <text x="970" y="312" fill="#94a3b8" font-size="9" font-style="italic">tested: 8 sessions survive reboot</text>

  <!-- Skills + state files -->
  <rect x="640" y="355" width="580" height="155" rx="10" fill="rgba(13,148,136,0.10)" stroke="#0D9488" stroke-width="1.5"/>
  <text x="660" y="380" fill="#5EEAD4" font-size="11" font-weight="700" letter-spacing="2">SHARED FILES (per worktree)</text>
  <text x="660" y="403" fill="#f1f5f9" font-size="11" class="mono">.agent-state.md</text>
  <text x="660" y="418" fill="#94a3b8" font-size="9">handoff protocol · single source of truth across CLIs</text>
  <text x="660" y="441" fill="#f1f5f9" font-size="11" class="mono">~/.claude/skills/* (auto-loaded)</text>
  <text x="660" y="456" fill="#94a3b8" font-size="9">curated registry: bge-m3, hwpxskill, mattpocock, etc.</text>
  <text x="660" y="479" fill="#f1f5f9" font-size="11" class="mono">~/.logs/kit-*.log</text>
  <text x="660" y="494" fill="#94a3b8" font-size="9">spawn · handoff · healthcheck audit trail</text>

  <!-- External access (bottom) -->
  <rect x="40" y="555" width="1200" height="60" rx="10" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="60" y="580" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="2">EXTERNAL</text>
  <text x="200" y="582" fill="#f1f5f9" font-size="11" class="mono">cloudflared tunnel</text>
  <text x="200" y="598" fill="#94a3b8" font-size="9">SSH from anywhere via Zero Trust</text>
  <text x="500" y="582" fill="#f1f5f9" font-size="11" class="mono">git remote</text>
  <text x="500" y="598" fill="#94a3b8" font-size="9">push handoff state · review changes</text>
  <text x="800" y="582" fill="#f1f5f9" font-size="11" class="mono">Telegram MCP plugin</text>
  <text x="800" y="598" fill="#94a3b8" font-size="9">user issues commands · agents reply</text>
  <text x="1080" y="582" fill="#f1f5f9" font-size="11" class="mono">webhooks</text>
  <text x="1080" y="598" fill="#94a3b8" font-size="9">CI · alerts · external triggers</text>

  <!-- Bottom note -->
  <text x="640" y="685" fill="#64748b" font-size="10" text-anchor="middle">8 concurrent sessions · 1 user account · 1 kit · proven on 30000-server-dev (Linux) and Mac mini</text>
</svg>
