<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-amber" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#0D9488"/>
    </marker>
    <marker id="arrow-gold" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#D4A574"/>
    </marker>
    <style>
      text { font-family: 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#0B1220"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Title -->
  <text x="640" y="55" fill="#D4A574" font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">BUTLER-SKILL-KIT</text>
  <text x="640" y="90" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">Pair Failover Flow</text>
  <text x="640" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">When the primary CLI hits a wall, the standby picks up — same worktree, same context.</text>

  <!-- ARROWS first (z-order) -->
  <!-- Claude → handoff -->
  <line x1="320" y1="305" x2="540" y2="305" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow-amber)"/>
  <text x="430" y="290" fill="#fbbf24" font-size="11" text-anchor="middle">hits rate limit</text>
  <text x="430" y="325" fill="#94a3b8" font-size="9" text-anchor="middle" class="mono">kit-handoff.sh be claude-to-codex</text>

  <!-- handoff → state.md -->
  <line x1="690" y1="345" x2="690" y2="430" stroke="#0D9488" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
  <text x="710" y="395" fill="#5EEAD4" font-size="10">writes</text>

  <!-- state.md → codex -->
  <line x1="850" y1="475" x2="980" y2="350" stroke="#0D9488" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
  <text x="940" y="430" fill="#5EEAD4" font-size="10">reads</text>

  <!-- codex → continue -->
  <line x1="1075" y1="305" x2="1075" y2="555" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="1100" y="430" fill="#60a5fa" font-size="11">continues</text>

  <!-- continue → claude reverse -->
  <line x1="975" y1="600" x2="345" y2="600" stroke="#D4A574" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-gold)"/>
  <text x="640" y="590" fill="#D4A574" font-size="11" text-anchor="middle">when Claude resets · reverse handoff</text>

  <!-- Claude (primary) -->
  <rect x="120" y="240" width="200" height="130" rx="10" fill="#0F1729"/>
  <rect x="120" y="240" width="200" height="130" rx="10" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="2"/>
  <text x="220" y="270" fill="#F59E0B" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">PRIMARY</text>
  <text x="220" y="300" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">Claude Code</text>
  <text x="220" y="330" fill="#fbbf24" font-size="11" text-anchor="middle" class="mono">--dangerously-skip-permissions</text>
  <text x="220" y="350" fill="#94a3b8" font-size="10" text-anchor="middle">5h cap · 200K context</text>

  <!-- handoff script -->
  <rect x="540" y="265" width="300" height="80" rx="10" fill="#0F1729"/>
  <rect x="540" y="265" width="300" height="80" rx="10" fill="rgba(212,165,116,0.12)" stroke="#D4A574" stroke-width="1.5"/>
  <text x="690" y="290" fill="#D4A574" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">BUTLER-KIT</text>
  <text x="690" y="315" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle" class="mono">kit-handoff.sh</text>
  <text x="690" y="334" fill="#94a3b8" font-size="9" text-anchor="middle">commits state · switches active model</text>

  <!-- .agent-state.md (center bottom) -->
  <rect x="540" y="430" width="300" height="100" rx="10" fill="#0F1729"/>
  <rect x="540" y="430" width="300" height="100" rx="10" fill="rgba(13,148,136,0.18)" stroke="#0D9488" stroke-width="2"/>
  <text x="690" y="455" fill="#5EEAD4" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">SHARED STATE</text>
  <text x="690" y="478" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle" class="mono">.agent-state.md</text>
  <text x="690" y="498" fill="#94a3b8" font-size="9" text-anchor="middle">active-model · current-task · progress</text>
  <text x="690" y="514" fill="#94a3b8" font-size="9" text-anchor="middle">next-step · open-questions · handoff-notes</text>

  <!-- Codex (standby) -->
  <rect x="980" y="240" width="200" height="130" rx="10" fill="#0F1729"/>
  <rect x="980" y="240" width="200" height="130" rx="10" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="2"/>
  <text x="1080" y="270" fill="#3B82F6" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">STANDBY</text>
  <text x="1080" y="300" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">Codex CLI</text>
  <text x="1080" y="330" fill="#60a5fa" font-size="11" text-anchor="middle" class="mono">--full-auto</text>
  <text x="1080" y="350" fill="#94a3b8" font-size="10" text-anchor="middle">7h cap · 1M context</text>

  <!-- continues block -->
  <rect x="975" y="555" width="200" height="60" rx="10" fill="#0F1729"/>
  <rect x="975" y="555" width="200" height="60" rx="10" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="1075" y="580" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">continues at next-step</text>
  <text x="1075" y="600" fill="#94a3b8" font-size="9" text-anchor="middle">no context loss · same worktree</text>

  <!-- Bottom note -->
  <text x="640" y="685" fill="#64748b" font-size="10" text-anchor="middle">No servers · no daemons · ~400 lines of bash · the kit is the protocol</text>
</svg>
