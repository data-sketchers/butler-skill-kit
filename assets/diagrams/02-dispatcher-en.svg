<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    <marker id="arr-gold" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#D4A574"/>
    </marker>
    <marker id="arr-teal" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#0D9488"/>
    </marker>
    <style>
      text { font-family: 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#0B1220"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <text x="640" y="55" fill="#D4A574" font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">BUTLER-SKILL-KIT</text>
  <text x="640" y="90" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">4-Way Model Dispatcher</text>
  <text x="640" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">One unified entry point · routes to per-CLI wrapper · all models share one worktree</text>

  <!-- Entry point (top) -->
  <rect x="430" y="160" width="420" height="90" rx="12" fill="#0F1729"/>
  <rect x="430" y="160" width="420" height="90" rx="12" fill="rgba(212,165,116,0.15)" stroke="#D4A574" stroke-width="2"/>
  <text x="640" y="185" fill="#D4A574" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">UNIFIED ENTRY</text>
  <text x="640" y="215" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle" class="mono">kit-session-ensure.sh</text>
  <text x="640" y="237" fill="#94a3b8" font-size="10" text-anchor="middle" class="mono">&lt;model&gt; &lt;session&gt; &lt;workdir&gt; [...flags]</text>

  <!-- Arrows from entry to 4 wrappers -->
  <line x1="510" y1="270" x2="170" y2="320" stroke="#D4A574" stroke-width="1.8" marker-end="url(#arr-gold)"/>
  <line x1="585" y1="270" x2="455" y2="320" stroke="#D4A574" stroke-width="1.8" marker-end="url(#arr-gold)"/>
  <line x1="695" y1="270" x2="825" y2="320" stroke="#D4A574" stroke-width="1.8" marker-end="url(#arr-gold)"/>
  <line x1="770" y1="270" x2="1110" y2="320" stroke="#D4A574" stroke-width="1.8" marker-end="url(#arr-gold)"/>

  <!-- 4 CLI wrappers -->
  <!-- Claude -->
  <rect x="60" y="320" width="220" height="115" rx="10" fill="#0F1729"/>
  <rect x="60" y="320" width="220" height="115" rx="10" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="2"/>
  <text x="170" y="346" fill="#F59E0B" font-size="11" font-weight="700" text-anchor="middle">CLAUDE</text>
  <text x="170" y="370" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle" class="mono">kit-claude-session.sh</text>
  <text x="170" y="395" fill="#94a3b8" font-size="9" text-anchor="middle">auto-confirms first-run trust</text>
  <text x="170" y="409" fill="#94a3b8" font-size="9" text-anchor="middle">flags: --resume</text>

  <!-- Codex -->
  <rect x="345" y="320" width="220" height="115" rx="10" fill="#0F1729"/>
  <rect x="345" y="320" width="220" height="115" rx="10" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="2"/>
  <text x="455" y="346" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">CODEX</text>
  <text x="455" y="370" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle" class="mono">kit-codex-session.sh</text>
  <text x="455" y="395" fill="#94a3b8" font-size="9" text-anchor="middle">auto-trusts worktree in config.toml</text>
  <text x="455" y="409" fill="#94a3b8" font-size="9" text-anchor="middle">flags: --resume</text>

  <!-- OpenCode -->
  <rect x="715" y="320" width="220" height="115" rx="10" fill="#0F1729"/>
  <rect x="715" y="320" width="220" height="115" rx="10" fill="rgba(139,92,246,0.15)" stroke="#8B5CF6" stroke-width="2"/>
  <text x="825" y="346" fill="#8B5CF6" font-size="11" font-weight="700" text-anchor="middle">OPENCODE</text>
  <text x="825" y="370" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle" class="mono">kit-opencode-session.sh</text>
  <text x="825" y="395" fill="#94a3b8" font-size="9" text-anchor="middle">multi-provider TUI · MCP support</text>
  <text x="825" y="409" fill="#94a3b8" font-size="9" text-anchor="middle">flags: --resume · --model provider/x</text>

  <!-- OMX -->
  <rect x="1000" y="320" width="220" height="115" rx="10" fill="#0F1729"/>
  <rect x="1000" y="320" width="220" height="115" rx="10" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="2"/>
  <text x="1110" y="346" fill="#F43F5E" font-size="11" font-weight="700" text-anchor="middle">OMX</text>
  <text x="1110" y="370" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle" class="mono">kit-omx-session.sh</text>
  <text x="1110" y="395" fill="#94a3b8" font-size="9" text-anchor="middle">oh-my-codex · auto-passes consent</text>
  <text x="1110" y="409" fill="#94a3b8" font-size="9" text-anchor="middle">flags: --high · --yolo · --spark</text>

  <!-- Arrows from 4 wrappers to shared workdir -->
  <line x1="170" y1="442" x2="540" y2="510" stroke="#0D9488" stroke-width="1.8" marker-end="url(#arr-teal)"/>
  <line x1="455" y1="442" x2="600" y2="510" stroke="#0D9488" stroke-width="1.8" marker-end="url(#arr-teal)"/>
  <line x1="825" y1="442" x2="690" y2="510" stroke="#0D9488" stroke-width="1.8" marker-end="url(#arr-teal)"/>
  <line x1="1110" y1="442" x2="745" y2="510" stroke="#0D9488" stroke-width="1.8" marker-end="url(#arr-teal)"/>

  <!-- Shared workdir + state -->
  <rect x="380" y="520" width="520" height="135" rx="12" fill="#0F1729"/>
  <rect x="380" y="520" width="520" height="135" rx="12" fill="rgba(13,148,136,0.18)" stroke="#0D9488" stroke-width="2"/>
  <text x="640" y="545" fill="#5EEAD4" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">SHARED WORKTREE</text>
  <text x="640" y="572" fill="#f1f5f9" font-size="16" font-weight="600" text-anchor="middle" class="mono">~/workspace/&lt;project&gt;</text>
  <line x1="430" y1="586" x2="850" y2="586" stroke="#0D9488" stroke-width="1" opacity="0.4"/>
  <text x="640" y="608" fill="#5EEAD4" font-size="11" text-anchor="middle" class="mono">.agent-state.md</text>
  <text x="640" y="624" fill="#94a3b8" font-size="9" text-anchor="middle">single source of truth · any wrapper reads/writes</text>
  <text x="640" y="640" fill="#94a3b8" font-size="9" text-anchor="middle">verified: 4 different CLIs in one worktree, no race</text>

  <!-- Bottom note -->
  <text x="640" y="690" fill="#64748b" font-size="10" text-anchor="middle">tmux session per CLI · idempotent spawn · same naming convention (builder-be-claude / -codex / -opencode / -omx)</text>
</svg>
